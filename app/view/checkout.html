<div class="extra-wide-container">
    <div class="card">
        <h1>Checkout</h1>
        <p>You are one step away from leasing your vehicle. Please confirm the details below and provide your information.</p>
        <div class="content-area" style="gap: 40px;">
            
            <!-- Left Side: Car Details -->
            <div class="main-content" style="flex-basis: 400px;">
                <h2>Your Selection</h2>
                {{car_details}}
            </div>

            <!-- Right Side: User & Payment Form -->
            <div class="sidebar" style="flex-basis: 400px; flex-grow: 1;">
                <h2>Your Information</h2>
                {{checkout_form}}
            </div>
        </div>
    </div>
</div>
