<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Razenderon Car Rentals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="/css/login.css" rel="stylesheet">
</head>
<body>
    <div class="background-image"></div>
    <div class="login-container">
        <h1>Razenderon Login</h1>
        <form class="login-form" method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            {{error}}
        </form>
        <a href="/welcome" style="display: block; margin-top: 15px; color: #005c97;">Return to homepage</a>
        <a href="/signup" style="display: block; margin-top: 15px; color: #005c97;">Sign up as new customer</a>
    </div>
</body>
</html>
